name: Build rote-mappe

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repo auschecken
        uses: actions/checkout@v4

      - name: 🟢 Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: 📦 Dependencies installieren
        run: npm ci

      - name: 🏗️ Build erstellen
        run: npm run build

      - name: 📦 ZIP erstellen
        run: |
          cd dist
          zip -r ../rote-mappe-build.zip .

      - name: 📤 Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: rote-mappe-build
          path: rote-mappe-build.zip
